<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- linha e seta: azul à esquerda passando para verde à direita -->
    <linearGradient id="linha" x1="120" y1="360" x2="410" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1AA3E8"/>
      <stop offset="0.5" stop-color="#16B98A"/>
      <stop offset="1" stop-color="#4CAF1E"/>
    </linearGradient>
    <!-- moldura: navy embaixo para azul em cima -->
    <linearGradient id="moldura" x1="104" y1="408" x2="408" y2="104" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#14284B"/>
      <stop offset="1" stop-color="#1E63C8"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="#FFFFFF"/>

  <!-- moldura arredondada, aberta no canto superior direito para a seta escapar -->
  <path d="M330 104 L158 104 Q104 104 104 158 L104 354 Q104 408 158 408 L354 408 Q408 408 408 354 L408 206"
    fill="none" stroke="url(#moldura)" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- barras: claro, médio, navy -->
  <rect x="150" y="322" width="48" height="56" rx="11" fill="#1AA3E8"/>
  <rect x="232" y="286" width="48" height="92" rx="11" fill="#1E63C8"/>
  <rect x="314" y="242" width="48" height="136" rx="11" fill="#14284B"/>
  <!-- barra fina de referência, à direita -->
  <rect x="384" y="214" width="14" height="164" rx="7" fill="#14284B"/>

  <!-- linha subindo + seta saindo pelo canto -->
  <g fill="none" stroke="url(#linha)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round">
    <path d="M150 320 L208 286 L266 258 L322 226 L420 120"/>
    <path d="M420 120 L372 120 M420 120 L420 168"/>
  </g>

  <!-- nós sobre a linha -->
  <g>
    <circle cx="208" cy="286" r="15" fill="#1AA3E8"/>
    <circle cx="266" cy="258" r="15" fill="#16B98A"/>
    <circle cx="322" cy="226" r="15" fill="#3DA82A"/>
  </g>
</svg>
